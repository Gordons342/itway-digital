## Netlify config for ITWAY
## Static site from project root + serverless functions for /api/*

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/lead"
  to = "/.netlify/functions/lead"
  status = 200
  force = true

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200
  force = true

